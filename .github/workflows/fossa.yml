name: FOSSA scanning
true:
  push:
    branches:
    - main
permissions:
  contents: read
jobs:
  fossa:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - uses: fossas/fossa-action@3ebcea1862c6ffbd5cf1b4d0bd6b3fe7bd6f2cac
      with:
        api-key: ${{secrets.FOSSA_API_KEY}}
        team: OpenTelemetry
    if: false
