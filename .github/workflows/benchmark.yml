name: Benchmark
true:
  push:
    branches:
    - main
  workflow_dispatch: null
permissions: read-all
env:
  DEFAULT_GO_VERSION: ~1.24.0
jobs:
  benchmark:
    name: Benchmarks
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
      with:
        go-version: ${{ env.DEFAULT_GO_VERSION }}
        check-latest: true
        cache-dependency-path: '**/go.sum'
    - name: Run benchmarks
      run: make benchmark | tee output.txt
    - name: Download previous benchmark data
      uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684
      with:
        path: ./benchmarks
        key: ${{ runner.os }}-benchmark-${{ github.event.before }}
    - name: Store benchmarks result
      uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7
      with:
        name: Benchmarks
        tool: go
        output-file-path: output.txt
        external-data-json-path: ./benchmarks/data.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        gh-pages-branch: benchmarks
        fail-on-alert: true
        alert-threshold: 400%
        summary-always: true
    - name: Save benchmark data
      uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684
      if: always()
      with:
        path: ./benchmarks
        key: ${{ runner.os }}-benchmark-${{ github.sha }}
    if: false
