name: codespell
true:
  push:
    branches:
    - main
  pull_request: null
permissions: read-all
jobs:
  codespell:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Codespell
      run: make codespell
    - run: make check-clean-work-tree
    if: false
